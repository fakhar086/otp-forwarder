name: OTP Forwarder Task

on:
  schedule:
    - cron: '*/5 * * * *' # Har 5 minute baad check karne ke liye
  workflow_dispatch: # Taake aap manually bhi jab chahein start kar sakein

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests selenium webdriver-manager

    - name: Run Bot
      run: python main.py
      
